<script>

const TARGET = 10000;

let last = 0;

function setText(id, value){
    document.getElementById(id).textContent = value;
}

async function fetchSubs(){

    const res = await fetch(
        "https://www.reddit.com/r/NuulyReviews/about.json?raw_json=1",
        { cache: "no-store" }
    );

    const text = await res.text();

    const json = JSON.parse(text);

    return json.data.subscribers;
}

function animate(from,to){

    const start = performance.now();

    function step(t){
        const p = Math.min((t-start)/900,1);
        const v = Math.floor(from + (to-from)*p);
        setText("count", v.toLocaleString());
        if(p<1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

async function update(){

    try{

        const subs = await fetchSubs();

        if(last === 0){
            last = subs;
            setText("count", subs.toLocaleString());
        }
        else if(last !== subs){
            animate(last, subs);
            last = subs;
        }

        setText("milestone", "🎯 " + (TARGET - subs).toLocaleString() + " to 10,000");

        setText("updated", "Updated: " + new Date().toLocaleTimeString());

    } catch(e){

        console.log(e);

        setText("updated", "Waiting for data feed...");
    }
}

update();
setInterval(update, 30000);

</script>

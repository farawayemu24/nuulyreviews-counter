<script>

const TARGET = 10000;
const KEY = "nuuly_tracker_v3";

let lastValue = 0;

function todayKey(){
    const d = new Date();
    return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function load(){
    return JSON.parse(localStorage.getItem(KEY));
}

function save(data){
    localStorage.setItem(KEY, JSON.stringify(data));
}

async function fetchSubs(){

    const url =
        "https://www.reddit.com/r/NuulyReviews/about.json?raw_json=1&cache=" +
        Date.now();

    const res = await fetch(url, {
        method: "GET",
        mode: "cors"
    });

    if(!res.ok){
        throw new Error("Reddit blocked request");
    }

    const json = await res.json();

    return json.data.subscribers;
}

function animate(from,to){

    const start = performance.now();

    function step(t){
        const p = Math.min((t-start)/900,1);
        const v = Math.floor(from + (to-from)*p);
        document.getElementById("count").textContent = v.toLocaleString();
        if(p<1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

function rollover(current){

    const today = todayKey();
    let d = load();

    if(!d){
        d = {date:today,start:current,yesterday:0};
        save(d);
        return d;
    }

    if(d.date !== today){
        d = {
            date:today,
            start:current,
            yesterday: current - d.start
        };
        save(d);
    }

    return d;
}

async function update(){

    try{

        const subs = await fetchSubs();
        const data = rollover(subs);

        if(lastValue === 0){
            lastValue = subs;
            document.getElementById("count").textContent = subs.toLocaleString();
        }
        else if(lastValue !== subs){
            animate(lastValue, subs);
            lastValue = subs;
        }

        document.getElementById("today").textContent =
            "+" + (subs - data.start).toLocaleString();

        document.getElementById("yesterday").textContent =
            "+" + data.yesterday.toLocaleString();

        document.getElementById("milestone").textContent =
            "🎯 " + (TARGET - subs).toLocaleString() + " to 10,000";

        document.getElementById("updated").textContent =
            "Updated: " + new Date().toLocaleTimeString();

    } catch(e){

        console.log(e);

        document.getElementById("updated").textContent =
            "Waiting for Reddit API...";
    }
}

update();
setInterval(update, 30000);

</script>

<script>

const TARGET = 10000;

let last = 0;

// always safe UI updater
function set(id, val){
    const el = document.getElementById(id);
    if(el) el.textContent = val;
}

// safe fetch with fallback
async function fetchSubs(){

    try{
        const res = await fetch(
            "https://www.reddit.com/r/NuulyReviews/about.json?raw_json=1",
            { cache: "no-store" }
        );

        const text = await res.text();

        const json = JSON.parse(text);

        return json?.data?.subscribers ?? null;

    } catch(e){
        console.log("Fetch failed:", e);
        return null;
    }
}

function animate(from,to){

    const start = performance.now();

    function step(t){
        const p = Math.min((t-start)/900,1);
        const v = Math.floor(from + (to-from)*p);
        set("count", v.toLocaleString());
        if(p<1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

async function update(){

    const subs = await fetchSubs();

    // 💡 fallback so page NEVER goes blank
    if(!subs){
        set("count", "—");
        set("milestone", "Waiting for Reddit data…");
        set("updated", "API unavailable right now");
        return;
    }

    if(last === 0){
        last = subs;
        set("count", subs.toLocaleString());
    }
    else if(last !== subs){
        animate(last, subs);
        last = subs;
    }

    set("milestone", "🎯 " + (TARGET - subs).toLocaleString() + " to 10,000");
    set("updated", "Updated: " + new Date().toLocaleTimeString());
}

update();
setInterval(update, 30000);

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NuulyReviews Counter</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6ea, #ffb3da);
}

.card {
    width: 720px;
    padding: 50px;
    text-align: center;
    background: rgba(255,255,255,0.92);
    border-radius: 28px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.title {
    font-size: 44px;
    font-weight: 700;
    color: #d63384;
}

.count {
    font-size: 110px;
    font-weight: 800;
    color: #d63384;
}

.milestone {
    font-size: 26px;
    color: #8a2b5c;
    margin-top: 10px;
}

.row {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 30px;
}

.box {
    text-align: center;
}

.label {
    font-size: 18px;
    color: #666;
}

.value {
    font-size: 40px;
    font-weight: 700;
    color: #28a745;
}

.updated {
    margin-top: 25px;
    color: #666;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">NuulyReviews Members</div>

    <div id="count" class="count">Loading...</div>

    <div id="milestone" class="milestone">Connecting...</div>

    <div class="row">
        <div class="box">
            <div class="label">Today</div>
            <div id="today" class="value">+0</div>
        </div>

        <div class="box">
            <div class="label">Yesterday</div>
            <div id="yesterday" class="value">+0</div>
        </div>
    </div>

    <div id="updated" class="updated">Starting...</div>

</div>

<script>

const TARGET = 10000;
const KEY = "nuuly_tracker_v2";

let lastValue = 0;

function todayKey(){
    const d = new Date();
    return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function load(){
    return JSON.parse(localStorage.getItem(KEY));
}

function save(data){
    localStorage.setItem(KEY, JSON.stringify(data));
}

// ✅ FIXED FETCH (CORS SAFE FOR GITHUB PAGES)
async function fetchSubs(){

    const url =
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent(
            "https://www.reddit.com/r/NuulyReviews/about.json"
        );

    const res = await fetch(url);

    if(!res.ok){
        throw new Error("Network error");
    }

    const json = await res.json();

    return json.data.subscribers;
}

function animate(from,to){

    const start = performance.now();

    function step(t){
        const p = Math.min((t-start)/900,1);
        const v = Math.floor(from + (to-from)*p);
        document.getElementById("count").textContent = v.toLocaleString();
        if(p<1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

function rollover(current){

    const today = todayKey();
    let d = load();

    if(!d){
        d = {date:today,start:current,yesterday:0};
        save(d);
        return d;
    }

    if(d.date !== today){
        d = {
            date:today,
            start:current,
            yesterday: current - d.start
        };
        save(d);
    }

    return d;
}

async function update(){

    try{

        const subs = await fetchSubs();
        const data = rollover(subs);

        if(lastValue === 0){
            lastValue = subs;
            document.getElementById("count").textContent = subs.toLocaleString();
        }
        else if(lastValue !== subs){
            animate(lastValue, subs);
            lastValue = subs;
        }

        document.getElementById("today").textContent =
            "+" + (subs - data.start).toLocaleString();

        document.getElementById("yesterday").textContent =
            "+" + data.yesterday.toLocaleString();

        document.getElementById("milestone").textContent =
            "🎯 " + (TARGET - subs).toLocaleString() + " to 10,000";

        document.getElementById("updated").textContent =
            "Updated: " + new Date().toLocaleTimeString();

    } catch(e){

        document.getElementById("updated").textContent =
            "Connecting to Reddit...";
    }
}

update();
setInterval(update, 30000);

</script>

</body>
</html>
